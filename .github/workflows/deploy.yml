name: Deploy Next.js Static Export to cPanel

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      # Uncomment only if your project still needs it
      # - name: Export static site
      #   run: npm run export

      - name: Verify build output
        run: |
          test -d out || (echo "out folder not found" && exit 1)
          echo "Contents of out/:"
          ls -la out
          echo "Important folders inside out/:"
          find out -maxdepth 2 -type d | sort

      - name: Deploy ONLY out/ contents to cPanel public_html
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_USERNAME }}
          password: ${{ secrets.CPANEL_PASSWORD }}
          port: ${{ secrets.CPANEL_PORT }}
          protocol: ftp
          local-dir: ./out/
          server-dir: ./public_html/
